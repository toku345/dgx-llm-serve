x-common: &common
  image: nvcr.io/nvidia/vllm:26.01-py3
  restart: unless-stopped
  ipc: host
  ports:
    - "127.0.0.1:8000:8000"
  volumes:
    - ${HOME}/model_weights:/app/model:ro
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
  ulimits:
    memlock:
      soft: -1
      hard: -1
    stack:
      soft: 67108864
      hard: 67108864
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 300s

services:
  vllm-qwen36:
    <<: *common
    # vLLM >= 0.19.0 が Qwen3.6 対応。ARM64/CUDA 13.0/Ubuntu 24.04 フル修飾タグで明示 pin
    image: vllm/vllm-openai:v0.19.0-aarch64-cu130-ubuntu2404
    profiles: ["qwen36"]
    command:
      - /app/model/Qwen/Qwen3.6-35B-A3B-FP8
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --served-model-name
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.8"
      - --max-model-len
      - "131072"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "2048"
      - --dtype
      - auto
      - --kv-cache-dtype
      - auto
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
